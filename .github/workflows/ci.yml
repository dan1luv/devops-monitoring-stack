name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install certifi

      - name: Run monitor
        run: python3 app/monitor.py
        continue-on-error: true

      - name: Check disk space
        run: df -h

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: dan1luv/devops-monitor:latest


  deploy:
      runs-on: self-hosted
      needs: build-and-push
      steps:
        - name: Clone or update repo
          run: |
            if [ -d ~/devops-monitoring-stack ]; then
              cd ~/devops-monitoring-stack && git pull
            else
              git clone https://github.com/dan1luv/devops-monitoring-stack.git ~/devops-monitoring-stack
            fi

        - name: Pull and restart
          run: |
            cd ~/devops-monitoring-stack
            docker compose pull
            docker compose up -d
